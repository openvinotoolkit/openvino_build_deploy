<svg xmlns="http://www.w3.org/2000/svg" width="860" height="886" viewBox="0 0 860 886">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 25px Arial, sans-serif; fill: #172033; }
    .subtitle { font: 400 14px Arial, sans-serif; fill: #64748b; }
    .node { stroke-width: 2; }
    .terminal { fill: #ecfdf5; stroke: #059669; }
    .process { fill: #eff6ff; stroke: #2563eb; }
    .decision { fill: #fff7ed; stroke: #ea580c; }
    .node-text { font: 600 13px Arial, sans-serif; fill: #172033; }
    .edge { fill: none; stroke: #64748b; stroke-width: 2; }
    .edge-label { font: 600 12px Arial, sans-serif; fill: #475569; }
    .empty { font: 500 16px Arial, sans-serif; fill: #64748b; }
    .panel { fill: #f8fafc; stroke: #d7dee8; }
  </style>
  <rect x="1" y="1" width="858" height="884" rx="8" class="panel"/>
  <text x="36" y="40" class="title">Extracted Flowchart</text>
  <text x="36" y="62" class="subtitle">6 node(s), 5 edge(s)</text>
  <path d="M 430 160 C 430 188, 430 188, 430 216" class="edge" marker-end="url(#arrow)"/><path d="M 430 288 C 430 316, 430 316, 430 344" class="edge" marker-end="url(#arrow)"/><path d="M 430 416 C 430 444, 430 444, 430 472" class="edge" marker-end="url(#arrow)"/><path d="M 430 544 C 430 572, 430 572, 430 600" class="edge" marker-end="url(#arrow)"/><path d="M 430 672 C 430 700, 430 700, 430 728" class="edge" marker-end="url(#arrow)"/>
  <rect x="280" y="88" width="300" height="72" rx="36" class="node terminal"/><text x="430" y="124" class="node-text" text-anchor="middle">Start - User opens login page</text><rect x="280" y="216" width="300" height="72" rx="8" class="node process"/><text x="430" y="252" class="node-text" text-anchor="middle">Enter credentials</text><polygon points="430.0,344 580,380.0 430.0,416 280,380.0" class="node decision"/><text x="430" y="371" class="node-text" text-anchor="middle">Validate input - is the form</text><text x="430" y="389" class="node-text" text-anchor="middle">empty?</text><rect x="280" y="472" width="300" height="72" rx="8" class="node process"/><text x="430" y="508" class="node-text" text-anchor="middle">Send authentication request</text><rect x="280" y="600" width="300" height="72" rx="8" class="node process"/><text x="430" y="636" class="node-text" text-anchor="middle">Success - show dashboard</text><rect x="280" y="728" width="300" height="72" rx="36" class="node terminal"/><text x="430" y="764" class="node-text" text-anchor="middle">End</text>
</svg>
