name: Sanity check (AI ref kits)

on:
  schedule:
    - cron: "0 2 * * *"
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  find-subprojects:
    runs-on: ubuntu-latest
    outputs:
      gradio: ${{ steps.categorize-subprojects.outputs.gradio }}
      webcam: ${{ steps.categorize-subprojects.outputs.webcam }}
      python: ${{ steps.categorize-subprojects.outputs.python }}
      notebook: ${{ steps.categorize-subprojects.outputs.notebook }}
      agentic: ${{ steps.categorize-subprojects.outputs.agentic }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine subprojects to test
        id: find-updates
        uses: ./.github/reusable-steps/find-updates
        with:
          dir: ai_ref_kits
          ci_config_file: sanity-check-kits.yml
      - name: Categorize subprojects
        id: categorize-subprojects
        uses: ./.github/reusable-steps/categorize-projects
        with:
          subprojects: ${{ steps.find-updates.outputs.subproject_dirs }}

  gradio:
    needs: find-subprojects
    if: ${{ needs.find-subprojects.outputs.gradio != '[]' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, windows-2025]
        python: ["3.10", "3.13"]
        subproject: ${{ fromJson(needs.find-subprojects.outputs.gradio) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/reusable-steps/setup-os
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: ./.github/reusable-steps/setup-python
        with:
          python: ${{ matrix.python }}
          project: ${{ matrix.subproject }}
      - uses: ./.github/reusable-steps/setup-hugging-face
        with:
          hf_token: ${{ secrets.HF_TOKEN }}
      - name: Check if test file exists
        id: determine-script
        shell: bash
        run: |
          if [[ -f "${{ matrix.subproject }}/ci/test.py" ]]; then
            echo "script=ci/test.py" >> "$GITHUB_ENV"
          else
            echo "script=main.py" >> "$GITHUB_ENV"
          fi
      - uses: ./.github/reusable-steps/gradio-action
        timeout-minutes: 30
        with:
          script: ${{ env.script }}
          project: ${{ matrix.subproject }}

  agentic:
    needs: find-subprojects
    if: ${{ needs.find-subprojects.outputs.agentic != '[]' }}
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, windows-2025]
        python: ["3.11", "3.13"]
        subproject: ${{ fromJson(needs.find-subprojects.outputs.agentic) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/reusable-steps/setup-os
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: ./.github/reusable-steps/setup-python
        with:
          python: ${{ matrix.python }}
          project: ${{ matrix.subproject }}
      - name: Start OVMS (Linux)
        if: runner.os == 'Linux'
        shell: bash
        timeout-minutes: 45
        run: |
          cd ${{ matrix.subproject }}
          bash download_and_run_models_linux.sh --device CPU
      - name: Install Windows runtime dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y vcredist-all --no-progress
      - name: Start OVMS (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        timeout-minutes: 45
        run: |
          cd ${{ matrix.subproject }}
          download_and_run_models_Windows.bat --device CPU
      - name: Check OVMS (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd ${{ matrix.subproject }}
          echo "=== docker ps ==="
          docker ps
          echo "=== ovms-llm inspect ==="
          docker inspect --format='{{json .State}}' ovms-llm || true
          echo "=== ovms-vlm inspect ==="
          docker inspect --format='{{json .State}}' ovms-vlm || true
          python ci/test.py --check-ovms
      - name: Check OVMS (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cd ${{ matrix.subproject }}
          python ci/test.py --check-ovms
      - name: Show OVMS logs on failure (Windows)
        if: failure() && runner.os == 'Windows'
        shell: pwsh
        run: |
          cd ${{ matrix.subproject }}
          Write-Host "=== OVMS LLM Log ==="
          if (Test-Path "logs\ovms_llm.log") { Get-Content "logs\ovms_llm.log" } else { Write-Host "No LLM log found" }
          Write-Host "=== OVMS VLM Log ==="
          if (Test-Path "logs\ovms_vlm.log") { Get-Content "logs\ovms_vlm.log" } else { Write-Host "No VLM log found" }
      - name: Start MCP (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
        run: |
          cd ${{ matrix.subproject }}
          python -c "import os; print('SERP_API_KEY present:', bool(os.getenv('SERP_API_KEY')))"
          python start_mcp_servers.py
      - name: Start MCP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
        run: |
          cd ${{ matrix.subproject }}
          python -c "import os; print('SERP_API_KEY present:', bool(os.getenv('SERP_API_KEY')))"
          python start_mcp_servers.py
      - name: Check MCP (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd ${{ matrix.subproject }}
          python ci/test.py --check-mcp
      - name: Check MCP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd ${{ matrix.subproject }}
          python ci/test.py --check-mcp
      - name: Start agents (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd ${{ matrix.subproject }}
          python start_agents.py
      - name: Start agents (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd ${{ matrix.subproject }}
          python start_agents.py
      - name: Check agents (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          AGENT_WARMUP_SECONDS: 15
          AGENT_QUERY_TIMEOUT_SECONDS: 1000
          AGENT_QUERY_RETRIES: 4
          AGENT_QUERY_RETRY_SLEEP_SECONDS: 8
        run: |
          cd ${{ matrix.subproject }}
          python ci/test.py --check-agents
      - name: Check agents (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          AGENT_WARMUP_SECONDS: 15
          AGENT_QUERY_TIMEOUT_SECONDS: 1000
          AGENT_QUERY_RETRIES: 4
          AGENT_QUERY_RETRY_SLEEP_SECONDS: 8
        run: |
          cd ${{ matrix.subproject }}
          python ci/test.py --check-agents
      - name: Stop OVMS, MCP and agents (Linux)
        if: always() && runner.os == 'Linux'
        shell: bash
        run: |
          cd ${{ matrix.subproject }}
          python start_agents.py --stop
          python start_mcp_servers.py --stop
          bash download_and_run_models_linux.sh --stop
      - name: Stop OVMS, MCP and agents (Windows)
        if: always() && runner.os == 'Windows'
        shell: powershell
        run: |
          cd ${{ matrix.subproject }}
          Get-WmiObject Win32_Process | Where-Object { $_.CommandLine -like '*agent_runner.py*' } | ForEach-Object { Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue }
          python start_mcp_servers.py --stop
          cmd /c "download_and_run_models_Windows.bat --stop"

  webcam:
    needs: find-subprojects
    if: ${{ needs.find-subprojects.outputs.webcam != '[]' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, windows-2025]
        python: ["3.10", "3.13"]
        subproject: ${{ fromJson(needs.find-subprojects.outputs.webcam) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/reusable-steps/setup-os
      - uses: ./.github/reusable-steps/setup-python
        with:
          python: ${{ matrix.python }}
          project: ${{ matrix.subproject }}
      - name: Run Webcam Demo
        shell: bash
        timeout-minutes: 30
        run: |
          cd ${{ matrix.subproject }}
          # linux requires a virtual display
          if [ "${{ runner.os }}" == "Linux" ]; then
            xvfb-run python main.py --stream sample_video.mp4
          else 
            python main.py --stream sample_video.mp4 
          fi

  python:
    needs: find-subprojects
    if: ${{ needs.find-subprojects.outputs.python != '[]' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, windows-2025]
        python: ["3.10", "3.13"]
        subproject: ${{ fromJson(needs.find-subprojects.outputs.python) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/reusable-steps/setup-os
      - uses: ./.github/reusable-steps/setup-python
        with:
          python: ${{ matrix.python }}
          project: ${{ matrix.subproject }}
      - name: Run Python
        shell: bash
        timeout-minutes: 10
        run: |
          cd ${{ matrix.subproject }}
          python main.py

  notebook:
    needs: find-subprojects
    if: ${{ needs.find-subprojects.outputs.notebook != '[]' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, windows-2025]
        python: ["3.10", "3.13"]
        subproject: ${{ fromJson(needs.find-subprojects.outputs.notebook) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/reusable-steps/setup-os
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: ./.github/reusable-steps/setup-python
        with:
          python: ${{ matrix.python }}
          project: ${{ matrix.subproject }}
      - name: Run Notebook
        shell: bash
        timeout-minutes: 30
        run: |
          cd ${{ matrix.subproject }}
          jupyter nbconvert --to notebook --debug --execute *.ipynb
