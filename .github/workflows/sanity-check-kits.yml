name: Sanity check (AI ref kits)

on:
  schedule:
    - cron: "0 2 * * *"
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  find-subprojects:
    runs-on: ubuntu-latest
    outputs:
      gradio: ${{ steps.categorize-subprojects.outputs.gradio }}
      webcam: ${{ steps.categorize-subprojects.outputs.webcam }}
      python: ${{ steps.categorize-subprojects.outputs.python }}
      notebook: ${{ steps.categorize-subprojects.outputs.notebook }}
      agentic: ${{ steps.categorize-subprojects.outputs.agentic }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine subprojects to test
        id: find-updates
        uses: ./.github/reusable-steps/find-updates
        with:
          dir: ai_ref_kits
          ci_config_file: sanity-check-kits.yml

      - name: Categorize subprojects
        id: categorize-subprojects
        uses: ./.github/reusable-steps/categorize-projects
        with:
          subprojects: ${{ steps.find-updates.outputs.subproject_dirs }}

  gradio:
    needs: find-subprojects
    if: ${{ needs.find-subprojects.outputs.gradio != '[]' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, windows-2025]
        python: ["3.10", "3.13"]
        subproject: ${{ fromJson(needs.find-subprojects.outputs.gradio) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/reusable-steps/setup-os

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: ./.github/reusable-steps/setup-python
        with:
          python: ${{ matrix.python }}
          project: ${{ matrix.subproject }}

      - uses: ./.github/reusable-steps/setup-hugging-face
        with:
          hf_token: ${{ secrets.HF_TOKEN }}

      - name: Determine script
        run: |
          if [ -f "${{ matrix.subproject }}/ci/test.py" ]; then
            echo "script=ci/test.py" >> $GITHUB_ENV
          else
            echo "script=main.py" >> $GITHUB_ENV
          fi

      - uses: ./.github/reusable-steps/gradio-action
        timeout-minutes: 30
        with:
          script: ${{ env.script }}
          project: ${{ matrix.subproject }}

  agentic:
    needs: find-subprojects
    if: ${{ needs.find-subprojects.outputs.agentic != '[]' }}
    runs-on: ${{ matrix.os }}

    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, windows-2025]
        python: ["3.11", "3.13"]
        subproject: ${{ fromJson(needs.find-subprojects.outputs.agentic) }}

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/reusable-steps/setup-os

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: ./.github/reusable-steps/setup-python
        with:
          python: ${{ matrix.python }}
          project: ${{ matrix.subproject }}

      # Linux AMD
      - name: Start OVMS (Linux amd64)
        if: runner.os == 'Linux' && matrix.os == 'ubuntu-24.04'
        run: |
          cd ${{ matrix.subproject }}
          bash download_and_run_models_linux.sh --device CPU

      # Linux ARM
      - name: Start OVMS (Linux ARM via emulation)
        if: runner.os == 'Linux' && matrix.os == 'ubuntu-24.04-arm'
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
        run: |
          cd ${{ matrix.subproject }}
          bash download_and_run_models_linux.sh \
            --device CPU \
            --timeout 5400 \
            --llm-model "OpenVINO/TinyLlama-1.1B-Chat-v1.0-int4-ov" \
            --vlm-model "OpenVINO/InternVL2-4B-int4-ov"

      # Windows
      - name: Install Windows deps
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install -y vcredist-all --no-progress

      - name: Start OVMS (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cd ${{ matrix.subproject }}
          download_and_run_models_Windows.bat

      - name: Check OVMS
        run: |
          cd ${{ matrix.subproject }}
          python ci/test.py --check-ovms

  python:
    needs: find-subprojects
    if: ${{ needs.find-subprojects.outputs.python != '[]' }}
    uses: ./.github/workflows/reusable-sanity-python.yml
    with:
      subprojects: ${{ needs.find-subprojects.outputs.python }}
      python_versions: '["3.10", "3.13"]'

  webcam:
    needs: find-subprojects
    if: ${{ needs.find-subprojects.outputs.webcam != '[]' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, windows-2025]
        python: ["3.10", "3.13"]
        subproject: ${{ fromJson(needs.find-subprojects.outputs.webcam) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/reusable-steps/setup-os

      - uses: ./.github/reusable-steps/setup-python
        with:
          python: ${{ matrix.python }}
          project: ${{ matrix.subproject }}

      - name: Run webcam demo
        run: |
          cd ${{ matrix.subproject }}
          if [ "${{ runner.os }}" == "Linux" ]; then
            xvfb-run python main.py --stream sample_video.mp4
          else
            python main.py --stream sample_video.mp4
          fi

  notebook:
    needs: find-subprojects
    if: ${{ needs.find-subprojects.outputs.notebook != '[]' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, windows-2025]
        python: ["3.10", "3.13"]
        subproject: ${{ fromJson(needs.find-subprojects.outputs.notebook) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/reusable-steps/setup-os

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: ./.github/reusable-steps/setup-python
        with:
          python: ${{ matrix.python }}
          project: ${{ matrix.subproject }}

      - name: Run notebook
        run: |
          cd ${{ matrix.subproject }}
          jupyter nbconvert --to notebook --execute *.ipynb