name: Hugging Face setup

inputs:
  hf_token:
    description: 'Hugging Face token'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install Hugging Face CLI
      shell: bash
      run: |
        uv pip install "huggingface_hub[cli]" hf_transfer hf_xet --system
    - name: Login to HF
      shell: bash
      env:
        HF_TOKEN: ${{ inputs.hf_token }}
      run: |
        if [ -n "$HF_TOKEN" ]; then  
          export PYTHONIOENCODING=utf-8
          if command -v hf >/dev/null 2>&1; then
            hf auth login --token "$HF_TOKEN"
          else
            # Back-compat for environments that only ship the legacy entrypoint.
            huggingface-cli login --token "$HF_TOKEN"
          fi
        else
          echo "HF_TOKEN not set, continuing without login."
        fi
    - name: Enable fast Hugging Face downloads
      shell: bash
      run: |
        echo "HF_HUB_ENABLE_HF_TRANSFER=1" >> $GITHUB_ENV
        echo "HF_HUB_DOWNLOAD_TIMEOUT=600" >> $GITHUB_ENV
